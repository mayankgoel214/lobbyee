name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "1"
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

  tenant-isolation:
    name: Tenant isolation (RLS) — HARD GATE
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lobbyee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lobbyee_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/lobbyee_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - name: Apply CI auth stub (auth.uid + authenticated role)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/ci/auth-stub.sql
      - name: Apply migrations (tables + RLS policies)
        run: pnpm prisma migrate deploy
      - name: Run tenant-isolation tests
        run: pnpm vitest run tests/integration
