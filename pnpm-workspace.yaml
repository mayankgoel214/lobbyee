allowBuilds:
  sharp: true
  prisma: true
  "@prisma/engines": true
  "@biomejs/biome": true
  esbuild: true
  "@google/genai": true
  protobufjs: true
  # @sentry/cli's build script only powers source-map upload, which we don't
  # use (no withSentryConfig); server error capture works without it.
  "@sentry/cli": false
